name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Snakemake
        run: |
          python -m pip install --upgrade pip
          python -m pip install "snakemake>=9,<10"

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Lint workflow
        run: snakemake --snakefile "$GITHUB_WORKSPACE/workflow/Snakefile" --lint

      - name: Dry-run workflow with minimal fixtures
        run: >
          snakemake
          --snakefile "$GITHUB_WORKSPACE/workflow/Snakefile"
          --directory "$GITHUB_WORKSPACE/tests/workdir"
          --cores 1
          --dry-run
          all
